services:
  dev:
    build: "./dev"
    init: true
    command: "sleep infinity"
    cap_drop:
      - "ALL"
    security_opt:
      - "no-new-privileges:true"
    volumes:
      - "..:/workspaces/kimono-coordinator"
      - "./claude/.claude:/home/vscode/.claude"
      - "./claude/.claude.json:/home/vscode/.claude.json"
      - "mise-data:/home/vscode/.local/share/mise"
      - "mise-cache:/home/vscode/.cache/mise"
    environment:
      - "TZ=Asia/Tokyo"

volumes:
  mise-data:
  mise-cache:
